<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="styleSheet" href="styles.css">
    <title>Charliemons</title>
</head>
<body>
    <header>
        <div class="header_content">
            <div class="logo_name">
                <div id="logo">
                    <a href="index.html">
                        <img src="logo/logo.png" alt="Charliemons logo">
                    </a>
                </div>
                <h2 id="page_name">
                    <a href="index.html">Charliemons</a>
                </h2>
            </div>
            <nav class="options">
                <ul id="options">
                    <li class="itemOption"><a href="index.html">Home</a></li>
                    <li class="itemOption"><a href="signup.html">Sign up</a></li>
                    <li class="itemOption"><a href="login.html">Log in</a></li>
                    <li class="itemOption"><a href="fav_charliemons.html">❤️ My Charliemons</a></li>
                </ul>
            </nav>
        </div>
    </header>

    <section class="hero">
        <h2>Welcome to the oficial website of Charliemons</h2>
        <p>Here you'll find information about your favorite Charliemon</p>
    </section>

    <main>
        <section class="pokedex_container">
            <h2>Search for your favorite Charliemon</h2>
            <form>
                <input type="text" name="sCharliemon" id="sCharliemon" placeholder="Type your charliemon nane or id">
                <button type="submit">Search</button>
            </form>
            <p id="error_msg"></p>
            <div id="charliemons_grid_search" class="grid_layout">
            </div>
        </section>
        <section class="pokedex_container">
            <h2>Some of our Charliemons</h2>
            <div id="charliemons_grid" class="grid_layout">
            </div>
        </section>
    </main>
    <footer>

    </footer>
    <script src="scripts.js"></script>
</body>
</html>
