<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="styleSheet" href="../static/styles.css">
    <title>Sign up</title>
</head>
<body>
    <header>
        <div class="header_content">
            <div class="logo_name">
                <div id="logo">
                    <a href=".">
                        <img src="../static/logo/logo.gif" alt="Charliemons logo">
                    </a>
                </div>
                <h2 id="page_name">
                    <a href=".">Charliemons</a>
                </h2>
            </div>
            <nav class="options">
                <ul id="options">
                    <li class="itemOption"><a href="/">Home</a></li>
                    <li class="itemOption"><a href="/signup">Sign up</a></li>
                    <li class="itemOption"><a href="/login">Log in</a></li>
                    <li class="itemOption"><a href="/fav_charliemons">❤️ My Charliemons</a></li>
                </ul>
            </nav>
        </div>
    </header>
    <main>
        <div class="form_container">
            <form class="myForm" id="signup_form">
                <h3>Sign up</h3>
                <br>
                <label for="username">Username:</label>
                <input type="text" name="username" id="username">
                <br><br>
                <label for="email">Email:</label>
                <input type="email" name="email" id="email">
                <br><br>
                <label for="password">Your password:</label>
                <input type="password" name="password" id="password">
                <br><br>
                <button type="submit">Sign up</button>
            </form>
        </div>
    </main>
    <footer>
        <div class="footer_content">
            <div class="footer_links">
                <a href="/">Home</a>
                <a href="/signup">Sign up</a>
                <a href="/login">Log in</a>
                <a href="/fav_charliemons">My Charliemons</a>
                <a href="/contact">Contact us</a>
            </div>
            <div class="footer_info">
                <p><strong>Charliemons</strong> - The oficial Charliemons website</p>
                <p>📧 sbernal@unsa.edu.pe | 📞 +51 987 654 321</p>
            </div>
            <p id="ultimoParrafo">&copy; 2025 Charliemons. All rights reserved.</p>
        </div>
    </footer>
    <script src="{{ url_for('static', filename='scripts/signup.js')}}"></script>
</body>
</html>
