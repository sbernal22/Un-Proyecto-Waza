<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="styleSheet" href="styles.css">
    <title>Sign up</title>
</head>
<body>
    <header>
        <div class="header_content">
            <div class="logo_name">
                <div id="logo">
                    <a href="index.html">
                        <img src="logo/logo.png" alt="Charliemons logo">
                    </a>
                </div>
                <h2 id="page_name">
                    <a href="index.html">Charliemons</a>
                </h2>
            </div>
            <nav class="options">
                <ul id="options">
                    <li class="itemOption"><a href="index.html">Home</a></li>
                    <li class="itemOption"><a href="signup.html">Sign up</a></li>
                    <li class="itemOption"><a href="login.html">Log in</a></li>
                    <li class="itemOption"><a href="fav_charliemons.html">❤️ My Charliemons</a></li>
                </ul>
            </nav>
        </div>
    </header>
    <main>
        <form class="myForm">
            <h3>Sign up</h3>
            <label for="names">Names:</label>
            <input type="text" name="names" id="names">
            <br><br>
            <label for="email">Email:</label>
            <input type="email" name="email" id="email">
            <br><br>
            <label for="password">Your password:</label>
            <input type="password" name="password" id="password">
        </form>
    </main>
</body>
</html>
